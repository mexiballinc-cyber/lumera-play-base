<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumera Play - B&W Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. ESTILOS GENERALES
        ========================================= */
        body { 
            margin: 0; 
            background: #0b0b0b; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* =========================================
           2. NAVBAR SUPERIOR
        ========================================= */
        .navbar { 
            display: flex; 
            align-items: center; 
            padding: 12px 18px; 
            background: #0b0b0b; 
            position: sticky; 
            top: 0; 
            z-index: 1001; 
            gap: 15px; 
            border-bottom: 1px solid #1a1a1a; 
        }
        
        .menuBtn { 
            font-size: 26px; 
            cursor: pointer; 
            display: none; 
            align-items: center; 
        } 
        
        .nav-logo { 
            font-size: 20px; 
            font-weight: 600; 
            letter-spacing: 1px; 
            margin: 0;
            cursor: pointer;
        }
        
        .nav-tabs { 
            display: flex; 
            gap: 15px; 
            margin-left: 10px; 
            flex-grow: 1; 
        }
        
        .tab { 
            font-size: 13px; 
            font-weight: 600; 
            color: #8c8c8c; 
            cursor: pointer; 
            transition: color 0.2s; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tab:hover, .tab.active { 
            color: white; 
        }
        
        .nav-right { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        
        .search-nav-btn {
            background: none;
            border: none;
            color: #8c8c8c;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .search-nav-btn:hover {
            color: white;
        }

        .profile-nav-btn { 
            background: white; 
            color: black; 
            border: none; 
            padding: 6px 14px; 
            font-size: 11px; 
            font-weight: 600; 
            border-radius: 20px; 
            cursor: pointer; 
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* =========================================
           3. MENÚ LATERAL (SIDEBAR)
        ========================================= */
        .sidebar { 
            position: fixed; 
            top: 0; 
            left: -240px; 
            width: 240px; 
            height: 100%; 
            background: #0b0b0b; 
            z-index: 1002; 
            transition: left 0.3s ease; 
            box-sizing: border-box; 
            padding: 70px 20px 20px 20px;
            border-right: 1px solid #1a1a1a;
        }
        
        .sidebar.open { 
            left: 0; 
        }
        
        .sidebar-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.5); 
            z-index: 1001; 
            display: none; 
        }
        
        /* =========================================
           4. CONTENEDOR DE PÁGINAS Y SECCIONES
        ========================================= */
        .page { 
            display: none; 
            padding-bottom: 60px;
        }
        
        .page.active { 
            display: block; 
        }
        
        /* =========================================
           5. EL HERO DE LUMERA (TU DISEÑO GRIS INTELIGENTE)
        ========================================= */
        .banner { 
            position: relative; 
            width: 92%; 
            height: 35vh; 
            min-height: 220px; 
            background: #111; 
            overflow: hidden;
            margin: 20px auto 10px auto;
            border-radius: 12px;
            border: 1px solid #1a1a1a;
        }
        
        .banner img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.35; 
            transition: opacity 0.4s ease-in-out;
        }
        
        .banner-gradient {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(11,11,11,0.95) 30%, rgba(11,11,11,0.6) 70%, rgba(11,11,11,0.1) 100%);
        }

        .banner-content { 
            position: absolute; 
            bottom: 0;
            top: 0;
            left: 5%; 
            max-width: 60%; 
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .banner-logo { 
            font-size: 38px; 
            font-weight: 600; 
            margin: 0 0 6px 0; 
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
        }
        
        .banner-desc { 
            font-size: 13px; 
            color: #8c8c8c; 
            max-width: 450px; 
            margin: 0 0 16px 0; 
            line-height: 1.4;
        }
        
        .banner-btn { 
            background: white; 
            color: black; 
            border: none; 
            padding: 8px 24px; 
            font-size: 11px; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: transform 0.2s;
            align-self: flex-start;
        }

        .banner-btn:hover {
            transform: scale(1.04);
        }
        
        /* =========================================
           6. CONTENEDOR DE FILAS / CAROUSELS
        ========================================= */
        .row-container { 
            padding: 15px 4% 0 4%; 
        }
        
        .row-title { 
            font-size: 12px; 
            font-weight: 600; 
            margin-bottom: 12px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8c8c8c;
        }
        
        .carousel-wrapper { 
            position: relative; 
            display: flex; 
            align-items: center; 
        }
        
        .carousel { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            scroll-behavior: smooth; 
            width: 100%;
            padding-bottom: 10px;
        }
        
        .carousel::-webkit-scrollbar { 
            display: none; 
        }
        
        /* =========================================
           7. TARJETAS DE CONTENIDO (POSTERS)
        ========================================= */
        .card { 
            flex: 0 0 auto; 
            width: 140px; 
            background: #111; 
            border: 1px solid #1a1a1a;
            border-radius: 6px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: transform 0.2s, border-color 0.2s; 
        }
        
        .card:hover { 
            transform: scale(1.03); 
            border-color: white;
        }
        
        .card img { 
            width: 100%; 
            height: 190px; 
            object-fit: cover; 
            background: #1a1a1a;
        }
        
        .card-info { 
            padding: 8px; 
        }
        
        .card-title { 
            font-size: 11px; 
            font-weight: 600; 
            margin: 0 0 2px 0; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        
        /* =========================================
           8. VISTA DE DETALLES (REPRODUCTOR)
        ========================================= */
        .details-view { 
            padding: 20px 4%; 
        }
        
        .back-btn { 
            background: none; 
            border: none; 
            color: #8c8c8c; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: 600; 
            padding: 0; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }
        
        .back-btn:hover { color: white; }
        
        .details-main { 
            display: flex; 
            gap: 25px; 
            margin-bottom: 25px; 
            flex-wrap: wrap; 
        }
        
        .details-poster { 
            width: 180px; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 6px; 
            background: #1a1a1a;
            border: 1px solid #1a1a1a;
        }
        
        .details-info { flex: 1; min-width: 280px; }
        .details-title { font-size: 26px; font-weight: 600; margin: 0 0 6px 0; }
        .details-desc { font-size: 13px; color: #b3b3b3; line-height: 1.5; margin: 0 0 20px 0; }
        
        .video-player-container {
            width: 100%; max-width: 850px; background: black; border-radius: 8px; overflow: hidden; border: 1px solid #1a1a1a; margin-top: 15px;
        }

        video { width: 100%; display: block; outline: none; }
        
        .seasons-section { margin-top: 30px; max-width: 850px; }
        .season-selector {
            background: #111; color: white; border: 1px solid #222; padding: 8px 12px; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 600; border-radius: 4px; cursor: pointer;
        }

        .episodes-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px;}
        .episode-item {
            display: flex; align-items: center; background: #111; border: 1px solid #1a1a1a; padding: 10px 15px; border-radius: 6px; cursor: pointer;
        }
        .episode-item:hover, .episode-item.active { background: #161616; border-color: white; }
        .episode-title { font-size: 13px; font-weight: 600; flex-grow: 1; }
        
        /* =========================================
           9. SECCIÓN SPARK (COMUNIDAD)
        ========================================= */
        .spark-container { max-width: 600px; margin: 0 auto; padding: 20px 15px; }
        .spark-header { text-align: center; margin-bottom: 25px; }
        .spark-header h2 { font-size: 20px; font-weight: 600; text-transform: uppercase; }
        .spark-header p { font-size: 11px; color: #666; }
        .spark-composer { background: #111; border: 1px solid #1a1a1a; border-radius: 8px; padding: 12px; margin-bottom: 20px; }
        .spark-textarea {
            width: 100%; height: 70px; background: none; border: none; resize: none; color: white; font-family: 'Poppins', sans-serif; font-size: 13px; outline: none;
        }
        .spark-composer-footer { display: flex; justify-content: flex-end; margin-top: 8px; border-top: 1px solid #1a1a1a; padding-top: 8px; }
        .spark-btn { background: white; color: black; border: none; padding: 5px 16px; font-size: 11px; font-weight: 600; border-radius: 4px; cursor: pointer; }
        .spark-feed { display: flex; flex-direction: column; gap: 12px; }
        .spark-card { background: #111; border: 1px solid #1a1a1a; border-radius: 8px; padding: 14px; }
        .spark-author { font-size: 12px; font-weight: 600; }
        .spark-body { font-size: 13px; color: #cccccc; margin-top: 5px; }

        /* =========================================
           10. BÚSQUEDA
        ========================================= */
        .search-container { padding: 20px 4%; }
        .search-bar-wrapper { max-width: 500px; margin: 0 auto 25px auto; }
        .search-input {
            width: 100%; background: #111; border: 1px solid #1a1a1a; padding: 10px 15px; color: white; font-family: 'Poppins', sans-serif; font-size: 13px; border-radius: 6px; box-sizing: border-box; outline: none;
        }
        .search-results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }

        /* =========================================
           11. MODAL DE PERFILES Y COMPONENTES
        ========================================= */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content { background: #111; border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; width: 90%; max-width: 360px; box-sizing: border-box; }
        .modal-title { font-size: 15px; font-weight: 600; text-align: center; margin-bottom: 15px; text-transform: uppercase; }
        .modal-input {
            width: 100%; background: #1a1a1a; border: 1px solid #222; padding: 8px 12px; color: white; font-family: 'Poppins', sans-serif; font-size: 12px; border-radius: 4px; box-sizing: border-box; outline: none; margin-bottom: 15px;
        }
        .modal-footer-btns { display: flex; flex-direction: column; gap: 8px; }
        .action-btn { width: 100%; padding: 8px; font-size: 11px; font-family: 'Poppins', sans-serif; font-weight: 600; border-radius: 4px; cursor: pointer; text-transform: uppercase; border: none; }
        .btn-primary { background: white; color: black; }
        .btn-secondary { background: #222; color: #8c8c8c; border: 1px solid #333; }

        .profile-select-screen { max-width: 500px; margin: 60px auto 0 auto; text-align: center; padding: 0 20px; }
        .profile-select-title { font-size: 18px; font-weight: 600; text-transform: uppercase; margin-bottom: 30px; }
        .profiles-layout { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .profile-slot { width: 90px; cursor: pointer; text-align: center; }
        .profile-avatar-box {
            width: 90px; height: 90px; background: #111; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 600; color: #8c8c8c; transition: all 0.2s;
        }
        .profile-slot:hover .profile-avatar-box { border-color: white; transform: scale(1.02); color: white; }
        .profile-slot-name { font-size: 11px; font-weight: 600; color: #8c8c8c; }
        .profile-slot:hover .profile-slot-name { color: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="menuBtn" onclick="toggleSidebar()">☰</div>
        <h1 class="nav-logo" onclick="switchPage('home')">Lumera Play</h1>
        
        <div class="nav-tabs" id="navTabs" style="pointer-events: none; opacity: 0.2;">
            <div class="tab active" data-target="home" onclick="switchPage('home')">Inicio</div>
            <div class="tab" data-target="series" onclick="switchPage('series')">Series</div>
            <div class="tab" data-target="peliculas" onclick="switchPage('peliculas')">Películas</div>
            <div class="tab" data-target="kids" onclick="switchPage('kids')">Kids</div>
            <div class="tab" data-target="spark" onclick="switchPage('spark')">Spark</div>
        </div>
        
        <div class="nav-right">
            <button class="search-nav-btn" id="searchNavBtn" style="display:none;" onclick="switchPage('searchPage')">🔍</button>
            <button class="profile-nav-btn" id="activeProfileBtn" onclick="goToProfilesScreen()">Perfil</button>
        </div>
    </div>

    <div class="page active" id="profiles">
        <div class="profile-select-screen">
            <h2 class="profile-select-title">¿Quién está viendo ahora?</h2>
            <div class="profiles-layout" id="profilesLayout"></div>
        </div>
    </div>

    <div class="page" id="home">
        <div class="banner" id="heroBannerGlobal">
            <img id="heroImgGlobal" src="https://i.imgur.com/O22zpTd.png" alt="Destacado">
            <div class="banner-gradient"></div>
            <div class="banner-content">
                <h2 class="banner-logo" id="heroTitleGlobal">LUMERA</h2>
                <p class="banner-desc" id="heroDescGlobal">Cargando la mejor experiencia...</p>
                <button class="banner-btn" id="heroBtnGlobal" style="display: none;">Ver Ahora</button>
            </div>
        </div>
        <div class="row-container" id="homeRows"></div>
    </div>

    <div class="page" id="series"><div class="row-container" id="seriesRows"></div></div>
    <div class="page" id="peliculas"><div class="row-container" id="peliculasRows"></div></div>
    <div class="page" id="kids"><div class="row-container" id="kidsRows"></div></div>

    <div class="page" id="spark">
        <div class="spark-container">
            <div class="spark-header"><h2>Spark</h2><p>Comunidad Lumera</p></div>
            <div class="spark-composer">
                <textarea class="spark-textarea" id="sparkInput" placeholder="Comparte un pensamiento con la comunidad..."></textarea>
                <div class="spark-composer-footer"><button class="spark-btn" onclick="postSpark()">Publicar</button></div>
            </div>
            <div class="spark-feed" id="sparkFeed"></div>
        </div>
    </div>

    <div class="page" id="searchPage">
        <div class="search-container">
            <div class="search-bar-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="Buscar contenido..." oninput="executeSearch()">
            </div>
            <div class="search-results-grid" id="searchResultsGrid"></div>
        </div>
    </div>

    <div class="page" id="detailsPage">
        <div class="details-view" id="detailsViewContainer"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 class="modal-title">Crear Perfil</h3>
            <input type="text" id="profileName" class="modal-input" placeholder="Nombre del perfil" maxlength="12">
            <div class="modal-footer-btns">
                <button class="action-btn btn-primary" onclick="saveProfile()">Crear</button>
                <button class="action-btn btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let profiles = JSON.parse(localStorage.getItem("lumera_profiles")) || [];
        let sparks = JSON.parse(localStorage.getItem("lumera_sparks")) || [];
        let activeProfile = null;
        
        let contentDB = [];
        let heroDB = [
            { "titulo": "Look at!", "desc": "Un secuestro que sale terriblemente mal. Explora esta atrapante historia de fantasía y drama.", "imagen_banner": "https://i.imgur.com/PYu8Cmo.jpeg", "target_id": "look-at-2026" },
            { "titulo": "Lumera Play", "desc": "Tu espacio definitivo de entretenimiento digital independiente. Contenido exclusivo.", "imagen_banner": "https://i.imgur.com/O22zpTd.png", "target_id": null },
            { "titulo": "Lumera Kids", "desc": "¡La sección más divertida! Contenido sano para disfrutar en familia.", "imagen_banner": "https://i.imgur.com/albi71Z.jpeg", "target_id": null }
        ];
        let currentHeroIndex = 0;
        let heroInterval = null;

        async function initLumera() {
            try {
                const res = await fetch('peliculas.json');
                contentDB = await res.json();
            } catch(e) {
                console.warn("Usando base de datos de películas provisional.");
                contentDB = [
                    { "id": "lumera_intro_01", "title": "Lumera Intro", "year": "2026", "age": 0, "img": "https://i.imgur.com/KcIAK4D.png", "desc": "Bienvenido a Lumera Play.", "type": "ambos", "genres": ["accion"], "url": "https://www.dropbox.com/scl/fi/frin5xrzd74fvlakioqvi/copy_5C1DB4FB-8133-43B5-ABB6-E71928E5C7E3.mov?rlkey=asf1g1o8f091yb8f59tjlugck&st=61mtra5c&raw=1", "isSeries": false },
                    { "id": "look-at-2026", "title": "Look at!", "year": "2026", "age": 16, "img": "https://i.imgur.com/5YRXD8b.jpeg", "desc": "Un secuestro que sale terriblemente mal.", "type": "serie", "genres": ["fantasia"], "isSeries": true, "seasons": [{"name": "Temporada 1", "episodes": [{"title": "1. El Secuestro", "url": "https://archive.org/download/el-secuestro-capitulo-1-piloto-1_202606/EL%20SECUESTRO%20CAPITULO%201%20PILOTO%201.mp4"}]}]}
                ];
            }

            try {
                const resHero = await fetch('hero.json');
                const externalHero = await resHero.json();
                if(externalHero && externalHero.length > 0) heroDB = externalHero;
            } catch(e) {
                console.log("Cargando motor de respaldo interno para el Hero.");
            }

            renderProfilesGrid();
            startHeroRotation();
        }

        function startHeroRotation() {
            updateHeroUI(); 
            if(heroInterval) clearInterval(heroInterval);
            
            heroInterval = setInterval(() => {
                currentHeroIndex = (currentHeroIndex + 1) % heroDB.length;
                updateHeroUI();
            }, 10000);
        }

        function updateHeroUI() {
            if (!heroDB || heroDB.length === 0) return;
            const item = heroDB[currentHeroIndex];

            const imgEl = document.getElementById("heroImgGlobal");
            const titleEl = document.getElementById("heroTitleGlobal");
            const descEl = document.getElementById("heroDescGlobal");
            const btnEl = document.getElementById("heroBtnGlobal");

            if (imgEl) imgEl.src = item.imagen_banner;
            if (titleEl) titleEl.textContent = item.titulo;
            if (descEl) descEl.textContent = item.desc;

            if (btnEl) {
                if (item.target_id) {
                    btnEl.style.display = "inline-block";
                    btnEl.onclick = () => showDetails(item.target_id);
                } else {
                    btnEl.style.display = "none";
                }
            }
        }

        function switchPage(pageId) {
            const homeContainer = document.getElementById('home');
            const heroBox = document.getElementById('heroBannerGlobal');

            if (['home', 'series', 'peliculas', 'kids'].includes(pageId)) {
                homeContainer.classList.add('active');
                homeContainer.insertBefore(heroBox, homeContainer.firstChild); 
                heroBox.style.display = "block";

                document.getElementById('homeRows').style.display = pageId === 'home' ? 'block' : 'none';
                document.getElementById('seriesRows').style.display = pageId === 'series' ? 'block' : 'none';
                document.getElementById('peliculasRows').style.display = pageId === 'peliculas' ? 'block' : 'none';
                document.getElementById('kidsRows').style.display = pageId === 'kids' ? 'block' : 'none';
                
                document.getElementById('spark').classList.remove('active');
                document.getElementById('searchPage').classList.remove('active');
                document.getElementById('detailsPage').classList.remove('active');
                document.getElementById('profiles').classList.remove('active');
                
                renderContent(pageId);
            } else {
                homeContainer.classList.remove('active');
                if(heroBox) heroBox.style.display = "none";
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                const target = document.getElementById(pageId);
                if(target) target.classList.add('active');
            }

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.querySelector(`.tab[data-target="${pageId}"]`);
            if (activeTab) activeTab.classList.add('active');
        }

        function renderContent(viewType) {
            const targetContainer = document.getElementById(`${viewType}Rows`);
            if (!targetContainer) return;
            targetContainer.innerHTML = '';

            let filteredData = contentDB;
            if (viewType === 'series') filteredData = contentDB.filter(i => i.type === 'serie');
            if (viewType === 'peliculas') filteredData = contentDB.filter(i => i.type === 'pelicula');
            if (viewType === 'kids') filteredData = contentDB.filter(i => i.age === 0);

            const row = document.createElement('div');
            row.innerHTML = `
                <div class="row-title">Colección Disponible</div>
                <div class="carousel-wrapper">
                    <div class="carousel" id="inner_${viewType}"></div>
                </div>
            `;
            targetContainer.appendChild(row);

            const container = document.getElementById(`inner_${viewType}`);
            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => showDetails(item.id);
                card.innerHTML = `<img src="${item.img}"><div class="card-info"><div class="card-title">${item.title}</div></div>`;
                container.appendChild(card);
            });
        }

        function showDetails(id) {
            const item = contentDB.find(c => c.id === id);
            if (!item) return;

            switchPage('detailsPage');
            const container = document.getElementById('detailsViewContainer');
            container.innerHTML = `
                <button class="back-btn" onclick="switchPage('home')">← Volver</button>
                <div class="details-main">
                    <img src="${item.img}" class="details-poster">
                    <div class="details-info">
                        <h2>${item.title}</h2>
                        <p class="details-desc">${item.desc}</p>
                        <div class="video-player-container">
                            <video id="lumeraVideoPlayer" controls autoplay></video>
                        </div>
                        <div class="seasons-section" id="seasonsSection" style="display:none;">
                            <select class="season-selector" id="seasonSelector" onchange="changeSeason()"></select>
                            <div class="episodes-list" id="episodesList"></div>
                        </div>
                    </div>
                </div>
            `;

            const player = document.getElementById('lumeraVideoPlayer');
            if(item.isSeries && item.seasons) {
                document.getElementById('seasonsSection').style.display = 'block';
                window.currentViewingSeries = item;
                const selector = document.getElementById('seasonSelector');
                item.seasons.forEach((s, idx) => {
                    let opt = document.createElement('option'); opt.value = idx; opt.textContent = s.name;
                    selector.appendChild(opt);
                });
                changeSeason();
            } else {
                player.src = item.url;
            }
        }

        function changeSeason() {
            const item = window.currentViewingSeries;
            const idx = document.getElementById('seasonSelector').value;
            const list = document.getElementById('episodesList');
            list.innerHTML = '';
            
            item.seasons[idx].episodes.forEach(ep => {
                let div = document.createElement('div'); div.className = 'episode-item';
                div.innerHTML = `<div class="episode-title">${ep.title}</div>`;
                div.onclick = () => { document.getElementById('lumeraVideoPlayer').src = ep.url; };
                list.appendChild(div);
            });
            if(item.seasons[idx].episodes[0]) document.getElementById('lumeraVideoPlayer').src = item.seasons[idx].episodes[0].url;
        }

        function executeSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('searchResultsGrid');
            grid.innerHTML = '';
            contentDB.filter(i => i.title.toLowerCase().includes(q)).forEach(item => {
                let card = document.createElement('div'); card.className = 'card'; card.onclick = () => showDetails(item.id);
                card.innerHTML = `<img src="${item.img}"><div class="card-info"><div class="card-title">${item.title}</div></div>`;
                grid.appendChild(card);
            });
        }

        function renderProfilesGrid() {
            const layout = document.getElementById('profilesLayout'); layout.innerHTML = '';
            profiles.forEach((p, idx) => {
                let slot = document.createElement('div'); slot.className = 'profile-slot';
                slot.innerHTML = `<div class="profile-avatar-box">${p.name[0]}</div><div class="profile-slot-name">${p.name}</div>`;
                slot.onclick = () => selectProfile(p);
                layout.appendChild(slot);
            });
            if(profiles.length < 4) {
                let add = document.createElement('div'); add.className = 'profile-slot';
                add.innerHTML = `<div class="profile-avatar-box">+</div><div class="profile-slot-name">Añadir</div>`;
                add.onclick = () => document.getElementById('modal').style.display = 'flex';
                layout.appendChild(add);
            }
        }

        function selectProfile(p) {
            activeProfile = p;
            document.getElementById('activeProfileBtn').textContent = p.name;
            document.getElementById('navTabs').style.pointerEvents = "auto";
            document.getElementById('navTabs').style.opacity = "1";
            document.getElementById('searchNavBtn').style.display = "block";
            switchPage('home');
        }

        function saveProfile() {
            let name = document.getElementById('profileName').value.trim();
            if(!name) return;
            profiles.push({ name });
            localStorage.setItem("lumera_profiles", JSON.stringify(profiles));
            closeModal(); renderProfilesGrid();
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('profileName').value = ''; }
        function goToProfilesScreen() { activeProfile = null; document.getElementById('navTabs').style.pointerEvents = "none"; document.getElementById('navTabs').style.opacity = "0.2"; switchPage('profiles'); }
        function postSpark() { let input = document.getElementById('sparkInput'); if(!input.value.trim()) return; sparks.push({ author: activeProfile.name, text: input.value.trim() }); localStorage.setItem("lumera_sparks", JSON.stringify(sparks)); input.value = ''; renderSparks(); }
        function renderSparks() { const feed = document.getElementById('sparkFeed'); feed.innerHTML = ''; [...sparks].reverse().forEach(s => { let c = document.createElement('div'); c.className = 'spark-card'; c.innerHTML = `<div class="spark-author">${s.author}</div><div class="spark-body">${s.text}</div>`; feed.appendChild(c); }); }

        document.addEventListener('DOMContentLoaded', initLumera);
    </script>
</body>
</html>
