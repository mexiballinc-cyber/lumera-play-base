<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumera Play - B&W Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. ESTILOS GENERALES Y NAVBAR
        ========================================= */
        body { 
            margin: 0; 
            background: #0b0b0b; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
        }
        
        .navbar { 
            display: flex; 
            align-items: center; 
            padding: 12px 18px; 
            background: #0b0b0b; 
            position: sticky; 
            top: 0; 
            z-index: 1001; 
            gap: 15px; 
            border-bottom: 1px solid #1a1a1a; 
        }
        
        .nav-logo { 
            font-size: 20px; 
            font-weight: 600; 
            letter-spacing: 1px; 
            margin: 0;
            cursor: pointer;
        }
        
        .nav-tabs { 
            display: flex; 
            gap: 15px; 
            margin-left: 10px; 
            flex-grow: 1; 
        }
        
        .tab { 
            font-size: 13px; 
            font-weight: 600; 
            color: #8c8c8c; 
            cursor: pointer; 
            transition: color 0.2s; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .tab:hover, .tab.active { 
            color: white; 
        }
        
        .nav-right { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        
        .profile-nav-btn { 
            background: white; 
            color: black; 
            border: none; 
            padding: 6px 14px; 
            font-size: 11px; 
            font-weight: 600; 
            border-radius: 20px; 
            cursor: pointer; 
            text-transform: uppercase;
        }
        
        /* =========================================
           2. CONTENEDOR DE PÁGINAS
        ========================================= */
        .page { 
            display: none; 
            padding-bottom: 60px;
        }
        
        .page.active { 
            display: block; 
        }
        
        /* =========================================
           3. EL HERO DINÁMICO REPARADO
        ========================================= */
        .banner { 
            position: relative; 
            width: 92%; 
            height: 38vh; 
            min-height: 240px; 
            background: #111; 
            overflow: hidden;
            margin: 20px auto 10px auto;
            border-radius: 12px;
            border: 1px solid #1a1a1a;
        }
        
        .banner img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.4; 
            transition: opacity 0.4s ease-in-out;
        }
        
        .banner-gradient {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(11,11,11,0.95) 35%, rgba(11,11,11,0.4) 70%, rgba(11,11,11,0.1) 100%);
        }

        .banner-content { 
            position: absolute; 
            bottom: 0; top: 0; left: 5%; 
            max-width: 60%; 
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .banner-logo { 
            font-size: 36px; 
            font-weight: 600; 
            margin: 0 0 6px 0; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .banner-desc { 
            font-size: 13px; 
            color: #b3b3b3; 
            max-width: 460px; 
            margin: 0 0 16px 0; 
            line-height: 1.4;
        }
        
        .banner-btn { 
            background: white; 
            color: black; 
            border: none; 
            padding: 8px 24px; 
            font-size: 11px; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 20px;
            text-transform: uppercase;
            align-self: flex-start;
            transition: transform 0.2s;
        }

        .banner-btn:hover { transform: scale(1.04); }
        
        /* =========================================
           4. GALERÍAS Y TARJETAS
        ========================================= */
        .row-container { padding: 15px 4% 0 4%; }
        .row-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; text-transform: uppercase; color: #8c8c8c; }
        .carousel { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .carousel::-webkit-scrollbar { display: none; }
        
        .card { flex: 0 0 auto; width: 140px; background: #111; border: 1px solid #1a1a1a; border-radius: 6px; overflow: hidden; cursor: pointer; }
        .card img { width: 100%; height: 190px; object-fit: cover; }
        .card-info { padding: 8px; }
        .card-title { font-size: 11px; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* VISTA DETALLES */
        .details-view { padding: 20px 4%; }
        .back-btn { background: none; border: none; color: #8c8c8c; cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 15px; }
        .details-main { display: flex; gap: 25px; flex-wrap: wrap; }
        .details-poster { width: 180px; height: 250px; object-fit: cover; border-radius: 6px; border: 1px solid #1a1a1a; }
        .video-player-container { width: 100%; max-width: 850px; background: black; border-radius: 8px; overflow: hidden; border: 1px solid #1a1a1a; }
        video { width: 100%; display: block; }

        /* PERFILES */
        .profile-select-screen { max-width: 500px; margin: 60px auto 0 auto; text-align: center; }
        .profiles-layout { display: flex; gap: 20px; justify-content: center; }
        .profile-slot { width: 90px; cursor: pointer; text-align: center; }
        .profile-avatar-box { width: 90px; height: 90px; background: #111; border: 1px solid #1a1a1a; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #8c8c8c; }
        .profile-slot:hover .profile-avatar-box { border-color: white; color: white; }
    </style>
</head>
<body>

    <div class="navbar">
        <h1 class="nav-logo" onclick="switchPage('home')">Lumera Play</h1>
        <div class="nav-tabs" id="navTabs" style="pointer-events: none; opacity: 0.2;">
            <div class="tab active" data-target="home" onclick="switchPage('home')">Inicio</div>
            <div class="tab" data-target="series" onclick="switchPage('series')">Series</div>
            <div class="tab" data-target="pelis" onclick="switchPage('pelis')">Películas</div>
            <div class="tab" data-target="kids" onclick="switchPage('kids')">Kids</div>
        </div>
        <div class="nav-right">
            <button class="profile-nav-btn" id="activeProfileBtn" onclick="goToProfilesScreen()">Perfil</button>
        </div>
    </div>

    <div class="page active" id="profiles">
        <div class="profile-select-screen">
            <h2 style="font-size:18px; text-transform:uppercase; margin-bottom:30px;">¿Quién está viendo ahora?</h2>
            <div class="profiles-layout" id="profilesLayout"></div>
        </div>
    </div>

    <div class="banner" id="heroBannerGlobal" style="display: none;">
        <img id="heroImgGlobal" src="https://i.imgur.com/O22zpTd.png" alt="Banner">
        <div class="banner-gradient"></div>
        <div class="banner-content">
            <h2 class="banner-logo" id="heroTitleGlobal">LUMERA</h2>
            <p class="banner-desc" id="heroDescGlobal">Cargando catálogo...</p>
            <button class="banner-btn" id="heroBtnGlobal" style="display: none;">Ver Ahora</button>
        </div>
    </div>

    <div class="page" id="home"><div class="row-container" id="homeRows"></div></div>
    <div class="page" id="series"><div class="row-container" id="seriesRows"></div></div>
    <div class="page" id="pelis"><div class="row-container" id="pelisRows"></div></div>
    <div class="page" id="kids"><div class="row-container" id="kidsRows"></div></div>

    <div class="page" id="detailsPage">
        <div class="details-view" id="detailsViewContainer"></div>
    </div>

    <script>
        let profiles = JSON.parse(localStorage.getItem("lumera_profiles")) || [{name: "Admin"}];
        let activeProfile = null;
        let contentDB = [];
        
        // Copia exacta de tu hero.json como respaldo físico
        let heroDB = [
            { "titulo": "Look at!", "desc": "Un secuestro que sale terriblemente mal. Explora esta atrapante historia de fantasía y drama.", "imagen_banner": "https://i.imgur.com/PYu8Cmo.jpeg", "target_id": "look-at-2026" },
            { "titulo": "Lumera Play", "desc": "Tu espacio definitivo de entretenimiento digital independiente. Contenido exclusivo y producciones originales.", "imagen_banner": "https://i.imgur.com/O22zpTd.png", "target_id": null },
            { "titulo": "Lumera Kids", "desc": "¡La sección más divertida! Contenido apto para todo público y entretenimiento sano para disfrutar en familia.", "imagen_banner": "https://i.imgur.com/albi71Z.jpeg", "target_id": null }
        ];
        let currentHeroIndex = 0;
        let heroInterval = null;

        async function initLumera() {
            // Carga de catálogo simulado/remoto
            contentDB = [
                { "id": "look-at-2026", "title": "Look at!", "img": "https://i.imgur.com/5YRXD8b.jpeg", "desc": "Un secuestro que sale terriblemente mal.", "type": "serie", "url": "https://archive.org/download/el-secuestro-capitulo-1-piloto-1_202606/EL%20SECUESTRO%20CAPITULO%201%20PILOTO%201.mp4" },
                { "id": "intro_lumera", "title": "Lumera Original", "img": "https://i.imgur.com/KcIAK4D.png", "desc": "Clip promocional de entrada.", "type": "pelicula", "url": "https://www.dropbox.com/scl/fi/frin5xrzd74fvlakioqvi/copy_5C1DB4FB-8133-43B5-ABB6-E71928E5C7E3.mov?rlkey=asf1g1o8f091yb8f59tjlugck&st=61mtra5c&raw=1" }
            ];

            // Intentar leer tu hero.json externo
            try {
                const resHero = await fetch('hero.json');
                const externalHero = await resHero.json();
                if(externalHero && externalHero.length > 0) heroDB = externalHero;
            } catch(e) {
                console.log("Usando base de datos interna para el Hero Slider.");
            }

            renderProfilesGrid();
            startHeroRotation();
        }

        function startHeroRotation() {
            updateHeroUI();
            if(heroInterval) clearInterval(heroInterval);
            heroInterval = setInterval(() => {
                currentHeroIndex = (currentHeroIndex + 1) % heroDB.length;
                updateHeroUI();
            }, 10000);
        }

        function updateHeroUI() {
            if (!heroDB || heroDB.length === 0) return;
            const item = heroDB[currentHeroIndex];

            document.getElementById("heroImgGlobal").src = item.imagen_banner;
            document.getElementById("heroTitleGlobal").textContent = item.titulo;
            document.getElementById("heroDescGlobal").textContent = item.desc;

            const btn = document.getElementById("heroBtnGlobal");
            if(item.target_id) {
                btn.style.display = "inline-block";
                btn.onclick = () => showDetails(item.target_id);
            } else {
                btn.style.display = "none";
            }
        }

        function switchPage(pageId) {
            const heroBox = document.getElementById('heroBannerGlobal');
            
            if (['home', 'series', 'pelis', 'kids'].includes(pageId)) {
                // Ocultar todas las páginas primero
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                
                const targetPage = document.getElementById(pageId);
                targetPage.classList.add('active');
                
                // Mover el contenedor dinámico al inicio de la página activa (Elimina la imagen vieja fija)
                targetPage.insertBefore(heroBox, targetPage.firstChild);
                heroBox.style.display = "block";
                
                renderContent(pageId);
            } else {
                heroBox.style.display = "none";
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
            }

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.querySelector(`.tab[data-target="${pageId}"]`);
            if (activeTab) activeTab.classList.add('active');
        }

        function renderContent(viewType) {
            const target = document.getElementById(`${viewType}Rows`);
            target.innerHTML = '';

            let filtered = contentDB;
            if(viewType === 'series') filtered = contentDB.filter(i => i.type === 'serie');
            if(viewType === 'pelis') filtered = contentDB.filter(i => i.type === 'pelicula');
            if(viewType === 'kids') filtered = contentDB.filter(i => i.id === 'kids_null');

            const title = viewType === 'home' ? 'Continuar Viendo' : 'Catálogo Filtrado';
            
            const row = document.createElement('div');
            row.innerHTML = `
                <div class="row-title">${title}</div>
                <div class="carousel">
                    ${filtered.map(item => `
                        <div class="card" onclick="showDetails('${item.id}')">
                            <img src="${item.img}">
                            <div class="card-info"><div class="card-title">${item.title}</div></div>
                        </div>
                    `).join('')}
                </div>
            `;
            target.appendChild(row);
        }

        function showDetails(id) {
            const item = contentDB.find(c => c.id === id);
            if (!item) return;

            switchPage('detailsPage');
            document.getElementById('detailsViewContainer').innerHTML = `
                <button class="back-btn" onclick="switchPage('home')">← Volver</button>
                <div class="details-main">
                    <img src="${item.img}" class="details-poster">
                    <div class="details-info">
                        <h2>${item.title}</h2>
                        <p class="details-desc">${item.desc}</p>
                        <div class="video-player-container">
                            <video src="${item.url}" controls autoplay></video>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProfilesGrid() {
            const layout = document.getElementById('profilesLayout');
            layout.innerHTML = '';
            profiles.forEach(p => {
                let slot = document.createElement('div'); slot.className = 'profile-slot';
                slot.innerHTML = `<div class="profile-avatar-box">${p.name[0]}</div><div style="font-size:11px; font-weight:600; color:#8c8c8c;">${p.name}</div>`;
                slot.onclick = () => {
                    activeProfile = p;
                    document.getElementById('activeProfileBtn').textContent = p.name;
                    document.getElementById('navTabs').style.pointerEvents = "auto";
                    document.getElementById('navTabs').style.opacity = "1";
                    switchPage('home');
                };
                layout.appendChild(slot);
            });
        }

        function goToProfilesScreen() {
            activeProfile = null;
            document.getElementById('navTabs').style.pointerEvents = "none";
            document.getElementById('navTabs').style.opacity = "0.2";
            switchPage('profiles');
        }

        document.addEventListener('DOMContentLoaded', initLumera);
    </script>
</body>
</html>
