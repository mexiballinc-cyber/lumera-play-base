<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumera Play - B&W Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. ESTILOS GENERALES
        ========================================= */
        body { 
            margin: 0; 
            background: #0b0b0b; 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* =========================================
           2. NAVBAR SUPERIOR
        ========================================= */
        .navbar { 
            display: flex; 
            align-items: center; 
            padding: 12px 18px; 
            background: #0b0b0b; 
            position: sticky; 
            top: 0; 
            z-index: 1001; 
            gap: 15px; 
            border-bottom: 1px solid #1a1a1a; 
        }
        
        .menuBtn { 
            font-size: 26px; 
            cursor: pointer; 
            display: none; 
            align-items: center; 
        } 
        
        .nav-logo { 
            font-size: 20px; 
            font-weight: 600; 
            letter-spacing: 1px; 
            margin: 0; 
            cursor: pointer; 
        }
        
        .nav-tabs { 
            display: flex; 
            gap: 15px; 
            margin-left: 10px; 
            flex-grow: 1; 
        }
        
        .tab { 
            font-size: 13px; 
            font-weight: 600; 
            color: #8c8c8c; 
            cursor: pointer; 
            transition: color 0.2s; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        
        .tab:hover, .tab.active { 
            color: white; 
        }
        
        .nav-right { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        
        .search-nav-btn { 
            background: none; 
            border: none; 
            color: #8c8c8c; 
            font-size: 18px; 
            cursor: pointer; 
            padding: 4px; 
            display: flex; 
            align-items: center; 
        }
        
        .search-nav-btn:hover { color: white; }
        
        .profile-nav-btn { 
            background: white; 
            color: black; 
            border: none; 
            padding: 6px 14px; 
            font-size: 11px; 
            font-weight: 600; 
            border-radius: 20px; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

        /* =========================================
           AÑADIDO: HERO BANNER GLOBAL
        ========================================= */
        .banner { 
            position: relative; 
            width: 100%; 
            height: 45vh; 
            min-height: 300px; 
            background: #111; 
            overflow: hidden; 
            display: none; /* Se activa al entrar al perfil */
        }
        
        .banner.clickable { cursor: pointer; }
        
        .banner img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            opacity: 0.9; 
            transition: opacity 0.4s ease-in-out; 
        }
        
        .banner-gradient { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            height: 40%; 
            background: linear-gradient(to top, #0b0b0b 0%, rgba(11,11,11,0) 100%); 
        }
        
        /* =========================================
           3. ESTRUCTURA DE PÁGINAS Y CONTENEDORES
        ========================================= */
        .page { 
            display: none; 
            width: 100%; 
        }
        
        .page.active { 
            display: block; 
        }
        
        .row-container { 
            padding: 20px 4% 0 4%; 
        }
        
        .row-title { 
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 12px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            color: #ffffff; 
        }
        
        .carousel-wrapper { 
            position: relative; 
            display: flex; 
            align-items: center; 
        }
        
        .carousel { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            scroll-behavior: smooth; 
            width: 100%; 
            padding: 5px 0 15px 0; 
        }
        
        .carousel::-webkit-scrollbar { 
            display: none; 
        }
        
        .arrow { 
            position: absolute; 
            background: rgba(0, 0, 0, 0.8); 
            color: white; 
            border: 1px solid #222; 
            font-size: 20px; 
            width: 36px; 
            height: 36px; 
            cursor: pointer; 
            z-index: 10; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 50%; 
            user-select: none; 
            transition: background 0.2s; 
        }
        
        .arrow:hover { background: white; color: black; }
        .arrow-left { left: -12px; }
        .arrow-right { right: -12px; }
        
        .card { 
            flex: 0 0 auto; 
            width: 130px; 
            background: #111; 
            border: 1px solid #1a1a1a; 
            border-radius: 6px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: border-color 0.2s; 
        }
        
        .card:hover { border-color: white; }
        .card img { width: 100%; height: 180px; object-fit: cover; background: #1a1a1a; }
        .card-info { padding: 6px; }
        .card-title { font-size: 11px; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* =========================================
           4. VISTA DE DETALLES Y REPRODUCTOR
        ========================================= */
        .details-view { padding: 20px 4%; }
        .back-btn { background: none; border: none; color: #8c8c8c; cursor: pointer; font-size: 11px; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; }
        .back-btn:hover { color: white; }
        .details-main { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .details-poster { width: 150px; height: 210px; object-fit: cover; border-radius: 6px; border: 1px solid #1a1a1a; }
        .details-info { flex: 1; min-width: 250px; }
        .details-title { font-size: 22px; font-weight: 600; margin: 0 0 4px 0; }
        .details-desc { font-size: 12px; color: #b3b3b3; line-height: 1.5; margin: 0 0 15px 0; }
        .episode-selector-container { margin: 12px 0; }
        .episode-select { background: #111; color: white; border: 1px solid #333; padding: 6px 10px; font-family: 'Poppins', sans-serif; font-size: 12px; border-radius: 4px; width: 100%; max-width: 280px; outline: none; }
        .video-player-container { width: 100%; max-width: 800px; background: black; border-radius: 6px; overflow: hidden; border: 1px solid #1a1a1a; margin-top: 10px; }
        video { width: 100%; display: block; outline: none; }
        
        /* =========================================
           5. SECCIÓN SPARK (FEED & COMPOSER)
        ========================================= */
        .spark-container { max-width: 600px; margin: 0 auto; padding: 20px 15px; }
        .spark-header { text-align: center; margin-bottom: 25px; }
        .spark-header h2 { font-size: 20px; font-weight: 600; text-transform: uppercase; }
        .spark-composer { background: #111; border: 1px solid #1a1a1a; border-radius: 8px; padding: 12px; margin-bottom: 20px; }
        .spark-textarea { width: 100%; height: 70px; background: none; border: none; resize: none; color: white; font-family: 'Poppins', sans-serif; font-size: 13px; outline: none; }
        .spark-composer-footer { display: flex; justify-content: flex-end; margin-top: 8px; border-top: 1px solid #1a1a1a; padding-top: 8px; }
        .spark-btn { background: white; color: black; border: none; padding: 5px 16px; font-size: 11px; font-weight: 600; border-radius: 4px; cursor: pointer; }
        .spark-feed { display: flex; flex-direction: column; gap: 12px; }
        .spark-card { background: #111; border: 1px solid #1a1a1a; border-radius: 8px; padding: 14px; }
        .spark-author { font-size: 12px; font-weight: 600; }
        .spark-body { font-size: 13px; color: #cccccc; margin-top: 5px; }
        
        /* =========================================
           6. VISTA DE BÚSQUEDA
        ========================================= */
        .search-container { padding: 20px 4%; }
        .search-bar-wrapper { max-width: 500px; margin: 0 auto 25px auto; }
        .search-input { width: 100%; background: #111; border: 1px solid #1a1a1a; padding: 10px 15px; color: white; font-family: 'Poppins', sans-serif; font-size: 13px; border-radius: 6px; box-sizing: border-box; outline: none; }
        .search-results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
        
        /* =========================================
           7. MODAL DE EDICIÓN / CREACIÓN DE PERFIL
        ========================================= */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #111; border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; width: 90%; max-width: 360px; box-sizing: border-box; }
        .modal-title { font-size: 15px; font-weight: 600; text-align: center; margin-bottom: 15px; text-transform: uppercase; }
        .modal-input { width: 100%; background: #1a1a1a; border: 1px solid #222; padding: 8px 12px; color: white; font-family: 'Poppins', sans-serif; font-size: 12px; border-radius: 4px; box-sizing: border-box; outline: none; margin-bottom: 15px; }
        .label-text { font-size: 11px; font-weight: 600; color: #8c8c8c; margin-bottom: 6px; text-transform: uppercase; display: block; }
        .mode-toggle-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .toggle-btn { flex: 1; background: #1a1a1a; border: 1px solid #222; color: #8c8c8c; padding: 6px; font-size: 11px; font-family: 'Poppins', sans-serif; font-weight: 600; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .toggle-btn.active { background: white; color: black; border-color: white; }
        
        /* El grid de avatares circulares finos que pediste */
        .avatar-selection-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .avatar-option { width: 100%; aspect-ratio: 1; background: #1a1a1a; border: 2px solid transparent; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: transform 0.1s; }
        .avatar-option:hover { transform: scale(1.05); }
        .avatar-option.active { border-color: white; }
        
        .modal-footer-btns { display: flex; flex-direction: column; gap: 8px; }
        .action-btn { width: 100%; padding: 8px; font-size: 11px; font-family: 'Poppins', sans-serif; font-weight: 600; border-radius: 4px; cursor: pointer; text-transform: uppercase; border: none; }
        .btn-primary { background: white; color: black; }
        .btn-danger { background: #851c1c; color: white; margin-bottom: 4px; }
        .btn-secondary { background: #222; color: #8c8c8c; border: 1px solid #333; }
        
        /* =========================================
           8. PANTALLA SELECCIÓN DE PERFILES
        ========================================= */
        .profile-select-screen { max-width: 500px; margin: 60px auto 0 auto; text-align: center; padding: 0 20px; }
        .profile-select-title { font-size: 18px; font-weight: 600; text-transform: uppercase; margin-bottom: 30px; }
        .profiles-layout { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .profile-slot { width: 85px; cursor: pointer; text-align: center; position: relative; }
        .profile-avatar-box { width: 85px; height: 85px; background: #111; border: 1px solid #1a1a1a; border-radius: 50%; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: #8c8c8c; transition: border-color 0.2s; }
        .profile-slot:hover .profile-avatar-box { border-color: white; }
        .profile-slot-name { font-size: 11px; font-weight: 600; color: #8c8c8c; transition: color 0.2s; }
        .profile-slot:hover .profile-slot-name { color: white; }
        .edit-badge { position: absolute; top: 0; right: 0; background: white; color: black; font-size: 10px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; border: 1px solid #0b0b0b; opacity: 0.8; }
        .edit-badge:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="menuBtn">☰</div>
        <h1 class="nav-logo" onclick="switchPage('home')">Lumera Play</h1>
        <div class="nav-tabs" id="navTabs" style="pointer-events: none; opacity: 0.2;">
            <div class="tab" data-target="home" onclick="switchPage('home')">Inicio</div>
            <div class="tab" data-target="series" onclick="switchPage('series')">Series</div>
            <div class="tab" data-target="pelis" onclick="switchPage('pelis')">Películas</div>
            <div class="tab" data-target="kids" onclick="switchPage('kids')">Kids</div>
            <div class="tab" data-target="spark" onclick="switchPage('spark')">Spark</div>
        </div>
        <div class="nav-right">
            <button class="search-nav-btn" onclick="switchPage('searchPage')">🔍</button>
            <button class="profile-nav-btn" id="activeProfileBtn" onclick="goToProfilesScreen()">Perfil</button>
        </div>
    </div>

    <div class="banner" id="heroBannerGlobal">
        <img id="heroImgGlobal" src="" alt="Destacado Lumera">
        <div class="banner-gradient"></div>
    </div>

    <div class="page active" id="profiles">
        <div class="profile-select-screen">
            <h2 class="profile-select-title">¿Quién está viendo ahora?</h2>
            <div class="profiles-layout" id="profilesLayout"></div>
        </div>
    </div>

    <div class="page" id="home"><div class="row-container" id="homeRows"></div></div>
    <div class="page" id="series"><div class="row-container" id="seriesRows"></div></div>
    <div class="page" id="pelis"><div class="row-container" id="pelisRows"></div></div>
    <div class="page" id="kids"><div class="row-container" id="kidsRows"></div></div>

    <div class="page" id="spark">
        <div class="spark-container">
            <div class="spark-header">
                <h2>Spark</h2>
                <p style="font-size:12px; color:#8c8c8c; margin:0;">Comunidad Lumera</p>
            </div>
            <div class="spark-composer">
                <textarea class="spark-textarea" id="sparkInput" placeholder="Comparte un pensamiento con la comunidad..."></textarea>
                <div class="spark-composer-footer">
                    <button class="spark-btn" onclick="postSpark()">Publicar</button>
                </div>
            </div>
            <div class="spark-feed" id="sparkFeed"></div>
        </div>
    </div>

    <div class="page" id="searchPage">
        <div class="search-container">
            <div class="search-bar-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="Buscar contenido..." oninput="executeSearch()">
            </div>
            <div class="search-results-grid" id="searchResultsGrid"></div>
        </div>
    </div>

    <div class="page" id="detailsPage">
        <div class="details-view" id="detailsViewContainer"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">Crear Perfil</h3>
            <input type="text" id="profileName" class="modal-input" placeholder="Nombre del perfil" maxlength="12" oninput="updateLetterAvatar()">
            
            <span class="label-text">Restricción de Edad</span>
            <div class="mode-toggle-group">
                <button class="toggle-btn id-mode-btn active" onclick="setMode('NORMAL')">Normal (+16)</button>
                <button class="toggle-btn id-mode-btn" onclick="setMode('KIDS')">Kids (Infantil)</button>
            </div>
            
            <span class="label-text">Selecciona Avatar</span>
            <div class="avatar-selection-grid" id="avatarGrid"></div>
            
            <div class="modal-footer-btns">
                <button class="action-btn btn-danger" id="deleteProfileBtn" style="display:none;" onclick="deleteProfile()">Eliminar Perfil</button>
                <button class="action-btn btn-primary" id="saveProfileBtn" onclick="saveProfile()">Guardar</button>
                <button class="action-btn btn-secondary" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let profiles = JSON.parse(localStorage.getItem("lumera_profiles")) || [];
        let sparks = JSON.parse(localStorage.getItem("lumera_sparks")) || [];
        let activeProfile = null;
        let currentIdx = null;
        let selectedMode = "NORMAL";
        let selectedAvatar = "LETTER";
        
        let currentHeroIndex = 0;
        let heroInterval = null;

        // BANCO DE DATOS DEL HERO (SLIDER)
        const heroDB = [
          {
            "id": "banner_look_at",
            "titulo": "Look at!",
            "imagen_banner": "https://i.imgur.com/it3Dgae.jpeg",
            "target_id": "look-at-2026"
          },
          {
            "id": "banner_lumera_original",
            "titulo": "Lumera Play",
            "imagen_banner": "https://i.imgur.com/CFf05iK.png",
            "target_id": "lumera_intro_01"
          },
          {
            "id": "banner_lumera_kids",
            "titulo": "Lumera Kids",
            "imagen_banner": "https://i.imgur.com/BNZhIuA.jpeg",
            "target_id": null
          }
        ];

        // BASE DE DATOS DE PELÍCULAS ORIGINAL
        const contentDB = [
          { 
            "id": "lumera_intro_01",
            "title": "Lumera Intro", 
            "year": "2026", 
            "age": 0, 
            "img": "https://i.imgur.com/KcIAK4D.png", 
            "desc": "Bienvenido a Lumera Play.", 
            "type": "ambos", 
            "genres": ["accion"], 
            "url": "https://www.dropbox.com/scl/fi/frin5xrzd74fvlakioqvi/copy_5C1DB4FB-8133-43B5-ABB6-E71928E5C7E3.mov?rlkey=asf1g1o8f091yb8f59tjlugck&st=61mtra5c&raw=1",
            "isSeries": false
          },
          {
            "id": "look-at-2026",
            "title": "Look at!",
            "year": "2026",
            "age": 16, 
            "img": "https://i.imgur.com/5YRXD8b.jpeg",
            "desc": "Fantasía | +16. Un secuestro que sale terriblemente mal. Próximamente más detalles.",
            "type": "serie", 
            "genres": ["fantasia"], 
            "isSeries": true,
            "seasons": [
              {
                "name": "Temporada 1",
                "episodes": [
                  {
                    "id": "cap-1",
                    "title": "1. El Secuestro",
                    "url": "https://archive.org/download/el-secuestro-capitulo-1-piloto-1_202606/EL%20SECUESTRO%20CAPITULO%201%20%28PILOTO%29%20%281%29.mp4",
                    "tracks": [
                      { "label": "Español", "srclang": "es", "src": "https://www.dropbox.com/scl/fi/asiehpxn7q4kyin4rh1ok/EL-SECUESTRO-CAPITULO-1-PILOTO-1.vtt?rlkey=5z949xlqcvnqilai95fygjeti&st=teqmd2pm&raw=1" }
                    ]
                  },
                  {
                    "id": "cap-2", 
                    "title": "2. Borracho",
                    "url": "https://archive.org/download/el-secuestro-capitulo-1-piloto-1_202606/look%20at%20cap%202%20audiio%20reparado.mp4"
                  }
                ]
              }
            ]
          }
        ];

        const staticAvatars = ["🍿", "🎬", "🛸", "👾", "🦊", "👑", "👻"];

        // CONTROL DEL HERO BANNER AUTOMÁTICO
        function startHeroTimer() {
            if(heroInterval) clearInterval(heroInterval);
            renderHeroSlide();
            heroInterval = setInterval(() => {
                if(heroDB && heroDB.length > 0) {
                    currentHeroIndex = (currentHeroIndex + 1) % heroDB.length;
                    renderHeroSlide();
                }
            }, 5000); 
        }

        function renderHeroSlide() {
            if (!heroDB || heroDB.length === 0) return;
            const slide = heroDB[currentHeroIndex];
            const bannerElement = document.getElementById("heroBannerGlobal");
            const imgElement = document.getElementById("heroImgGlobal");

            if (imgElement) imgElement.src = slide.imagen_banner;
            if (bannerElement) {
                if(slide.target_id) {
                    bannerElement.classList.add("clickable");
                    bannerElement.onclick = () => showDetails(slide.target_id);
                } else {
                    bannerElement.classList.remove("clickable");
                    bannerElement.onclick = null;
                }
            }
        }

        // CONTROL DE NAVEGACIÓN ORIGINAL
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if(target) target.classList.add('active');

            const bannerGlobal = document.getElementById('heroBannerGlobal');
            if(bannerGlobal) {
                if (['home', 'series', 'pelis', 'kids'].includes(pageId) && activeProfile !== null) {
                    bannerGlobal.style.display = "block";
                    startHeroTimer();
                    renderContent(pageId);
                } else {
                    bannerGlobal.style.display = "none";
                    if(heroInterval) clearInterval(heroInterval);
                }
            }

            window.scrollTo({ top: 0, behavior: 'smooth' });

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.querySelector(`.tab[data-target="${pageId}"]`);
            if (activeTab) activeTab.classList.add('active');
            if(pageId === 'spark') renderSparks();
        }

        function renderContent(viewType) {
            const targetContainer = document.getElementById(`${viewType}Rows`);
            if (!targetContainer) return;
            targetContainer.innerHTML = '';

            let filteredData = contentDB;
            if (activeProfile && activeProfile.mode === "KIDS") {
                filteredData = contentDB.filter(i => i.age === 0);
            } else {
                if (viewType === 'series') filteredData = contentDB.filter(i => i.isSeries === true || i.type === 'serie');
                if (viewType === 'pelis') filteredData = contentDB.filter(i => i.isSeries === false && (i.type === 'pelicula' || i.type === 'ambos'));
                if (viewType === 'kids') filteredData = contentDB.filter(i => i.age === 0);
            }

            const row = document.createElement('div');
            const carouselId = `inner_${viewType}`;
            row.innerHTML = `
                <div class="row-title">Colección Disponible</div>
                <div class="carousel-wrapper">
                    <button class="arrow arrow-left" onclick="scrollCarousel('${carouselId}', -1)">‹</button>
                    <div class="carousel" id="${carouselId}"></div>
                    <button class="arrow arrow-right" onclick="scrollCarousel('${carouselId}', 1)">›</button>
                </div>
            `;
            targetContainer.appendChild(row);

            const container = document.getElementById(carouselId);
            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => showDetails(item.id);
                card.innerHTML = `<img src="${item.img}"><div class="card-info"><div class="card-title">${item.title}</div></div>`;
                container.appendChild(card);
            });
        }

        function scrollCarousel(id, direction) {
            const el = document.getElementById(id);
            if (el) el.scrollBy({ left: direction * 260, behavior: 'smooth' });
        }

        function showDetails(id) {
            const item = contentDB.find(c => c.id === id);
            if (!item) return;
            switchPage('detailsPage');
            
            const container = document.getElementById('detailsViewContainer');
            let htmlContent = `
                <button class="back-btn" onclick="switchPage('home')">← Volver al Inicio</button>
                <div class="details-main">
                    <img src="${item.img}" class="details-poster">
                    <div class="details-info">
                        <h2 class="details-title">${item.title}</h2>
                        <p class="details-desc">${item.desc}</p>
            `;

            if(item.isSeries && item.seasons) {
                htmlContent += `<div class="episode-selector-container"><select class="episode-select" id="episodeSelector" onchange="changeEpisode('${item.id}')">`;
                item.seasons[0].episodes.forEach((ep, idx) => {
                    htmlContent += `<option value="${idx}">${ep.title}</option>`;
                });
                htmlContent += `</select></div>`;
            }

            htmlContent += `
                        <div class="video-player-container">
                            <video id="lumeraVideoPlayer" controls autoplay></video>
                        </div>
                    </div>
                </div>
            `;
            
            container.innerHTML = htmlContent;
            
            if(item.isSeries && item.seasons) {
                changeEpisode(item.id);
            } else {
                document.getElementById('lumeraVideoPlayer').src = item.url;
            }
        }

        function changeEpisode(itemId) {
            const item = contentDB.find(c => c.id === itemId);
            const selector = document.getElementById('episodeSelector');
            const player = document.getElementById('lumeraVideoPlayer');
            if(!item || !selector || !player) return;

            const epIdx = selector.value;
            const episode = item.seasons[0].episodes[epIdx];
            
            player.innerHTML = ''; 
            player.src = episode.url;

            if(episode.tracks) {
                episode.tracks.forEach(trackData => {
                    const track = document.createElement('track');
                    track.kind = 'subtitles';
                    track.label = trackData.label;
                    track.srclang = trackData.srclang;
                    track.src = trackData.src;
                    if(trackData.srclang === 'es') track.default = true;
                    player.appendChild(track);
                });
            }
            player.load();
        }

        function executeSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('searchResultsGrid');
            grid.innerHTML = '';
            contentDB.filter(i => i.title.toLowerCase().includes(q)).forEach(item => {
                let card = document.createElement('div'); 
                card.className = 'card'; 
                card.onclick = () => showDetails(item.id);
                card.innerHTML = `<img src="${item.img}"><div class="card-info"><div class="card-title">${item.title}</div></div>`;
                grid.appendChild(card);
            });
        }

        // --- GESTIÓN DE PERFILES FINOS Y CIRCULARES ---
        function renderProfiles() {
            const layout = document.getElementById('profilesLayout');
            layout.innerHTML = '';
            
            profiles.forEach((p, idx) => {
                let slot = document.createElement('div');
                slot.className = 'profile-slot';
                
                let avatarHtml = p.avatar === "LETTER" ? (p.name ? p.name[0].toUpperCase() : "?") : p.avatar;
                
                slot.innerHTML = `
                    <div class="profile-avatar-box" onclick="selectProfile(${idx})">${avatarHtml}</div>
                    <div class="profile-slot-name" onclick="selectProfile(${idx})">${p.name}</div>
                    <div class="edit-badge" onclick="openModal(${idx})">✏️</div>
                `;
                layout.appendChild(slot);
            });
            
            if(profiles.length < 4) {
                let addSlot = document.createElement('div');
                addSlot.className = 'profile-slot';
                addSlot.innerHTML = `
                    <div class="profile-avatar-box" onclick="openModal(null)">+</div>
                    <div class="profile-slot-name" onclick="openModal(null)">Añadir</div>
                `;
                layout.appendChild(addSlot);
            }
        }

        function selectProfile(idx) {
            activeProfile = profiles[idx];
            document.getElementById('activeProfileBtn').textContent = activeProfile.name;
            
            const tabs = document.getElementById('navTabs');
            tabs.style.pointerEvents = "auto";
            tabs.style.opacity = "1";
            
            const searchBtn = document.querySelector('.search-nav-btn');
            if(searchBtn) searchBtn.style.display = 'flex';
            
            if(activeProfile.mode === "KIDS") {
                document.querySelectorAll('.tab').forEach(t => {
                    if(t.getAttribute('data-target') !== 'kids') t.style.display = 'none';
                });
                switchPage('kids');
            } else {
                document.querySelectorAll('.tab').forEach(t => t.style.display = 'block');
                switchPage('home');
            }
        }

        function openModal(idx = null) {
            currentIdx = idx;
            const modal = document.getElementById('modal');
            modal.style.display = 'flex';
            
            if(idx !== null) {
                document.getElementById('modalTitle').textContent = "Editar Perfil";
                document.getElementById('profileName').value = profiles[idx].name;
                setMode(profiles[idx].mode);
                selectedAvatar = profiles[idx].avatar;
                document.getElementById('deleteProfileBtn').style.display = 'block';
            } else {
                document.getElementById('modalTitle').textContent = "Crear Perfil";
                document.getElementById('profileName').value = "";
                setMode("NORMAL");
                selectedAvatar = "LETTER";
                document.getElementById('deleteProfileBtn').style.display = 'none';
            }
            renderAvatarGrid();
        }

        function setMode(mode) {
            selectedMode = mode;
            document.querySelectorAll('.id-mode-btn').forEach(b => b.classList.remove('active'));
            if(mode === 'NORMAL') document.querySelectorAll('.id-mode-btn')[0].classList.add('active');
            else document.querySelectorAll('.id-mode-btn')[1].classList.add('active');
        }

        function renderAvatarGrid() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            
            let nameInput = document.getElementById('profileName').value.trim();
            let letter = nameInput ? nameInput[0].toUpperCase() : "?";
            
            let letterOpt = document.createElement('div');
            letterOpt.className = `avatar-option ${selectedAvatar === 'LETTER' ? 'active' : ''}`;
            letterOpt.textContent = letter;
            letterOpt.onclick = () => { selectedAvatar = "LETTER"; renderAvatarGrid(); };
            grid.appendChild(letterOpt);
            
            staticAvatars.forEach(av => {
                let opt = document.createElement('div');
                opt.className = `avatar-option ${selectedAvatar === av ? 'active' : ''}`;
                opt.textContent = av;
                opt.onclick = () => { selectedAvatar = av; renderAvatarGrid(); };
                grid.appendChild(opt);
            });
        }

        function updateLetterAvatar() {
            if(selectedAvatar === "LETTER") renderAvatarGrid();
        }

        function saveProfile() {
            let name = document.getElementById('profileName').value.trim();
            if(!name) return;
            
            let p = { name, mode: selectedMode, avatar: selectedAvatar };
            if(currentIdx !== null) profiles[currentIdx] = p;
            else profiles.push(p);
            
            localStorage.setItem("lumera_profiles", JSON.stringify(profiles));
            closeModal();
            renderProfiles();
        }

        function deleteProfile() {
            if(currentIdx !== null) {
                profiles.splice(currentIdx, 1);
                localStorage.setItem("lumera_profiles", JSON.stringify(profiles));
            }
            closeModal();
            renderProfiles();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function goToProfilesScreen() { activeProfile = null; document.getElementById('navTabs').style.pointerEvents = "none"; document.getElementById('navTabs').style.opacity = "0.2"; switchPage('profiles'); }
        
        function postSpark() { 
            let input = document.getElementById('sparkInput'); 
            if(!input.value.trim()) return; 
            sparks.push({ author: activeProfile.name, text: input.value.trim() }); 
            localStorage.setItem("lumera_sparks", JSON.stringify(sparks)); 
            input.value = ''; 
            renderSparks(); 
        }
        
        function renderSparks() { 
            const feed = document.getElementById('sparkFeed'); 
            feed.innerHTML = ''; 
            [...sparks].reverse().forEach(s => { 
                let c = document.createElement('div'); 
                c.className = 'spark-card'; 
                c.innerHTML = `<div class=\"spark-author\">${s.author}</div><div class=\"spark-body\">${s.text}</div>`; 
                feed.appendChild(c); 
            }); 
        }

        // --- INICIALIZACIÓN DE LA APP ---
        const initMenuBtn = document.querySelector('.menuBtn');
        const initSearchBtn = document.querySelector('.search-nav-btn');
        if(initMenuBtn) initMenuBtn.style.display = 'none';
        if(initSearchBtn) initSearchBtn.style.display = 'none';
        
        renderProfiles();
    </script>
</body>
</html>
