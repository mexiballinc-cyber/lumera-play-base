<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumera Play - B&W Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap\" rel=\"stylesheet\">
    
    <style>
        /* =========================================
           1. ESTILOS GENERALES
        ========================================= */
        body { 
            margin: 0; 
            background: #0b0b0b; 
            color: white; \n            font-family: 'Poppins', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* =========================================
           2. NAVBAR SUPERIOR
        ========================================= */
        .navbar { 
            display: flex; 
            align-items: center; 
            padding: 12px 18px; 
            background: #0b0b0b; 
            position: sticky; 
            top: 0; \n            z-index: 1001; 
            gap: 15px; 
            border-bottom: 1px solid #1a1a1a; 
        }
        
        .menuBtn { 
            font-size: 26px; 
            cursor: pointer; 
            display: none; 
            align-items: center; 
        } 
        
        .nav-logo { 
            font-size: 22px; 
            font-weight: bold; 
            background: linear-gradient(45deg, #ffffff, #a3a3a3); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: 1px; 
        }
        
        /* =========================================
           3. MENÚ LATERAL
        ========================================= */
        .menu { 
            width: 250px; 
            background: #0b0b0b; 
            height: 100vh; 
            position: fixed; 
            top: 0; 
            left: 0; 
            padding-top: 20px; 
            z-index: 1000; 
            border-right: 1px solid #1a1a1a; 
            transition: transform 0.3s ease; 
        }
        
        .menu-header { 
            font-size: 24px; 
            font-weight: bold; 
            padding: 10px 25px; 
            margin-bottom: 20px; 
            letter-spacing: 2px; 
            color: #ffffff; 
            border-bottom: 1px solid #1a1a1a; 
        }
        
        .menuItem { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 14px 25px; 
            color: #bcbcbc; 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: all 0.2s ease; 
        }
        
        .menuItem:hover, .menuItem.active { 
            background: #161616; 
            color: #ffffff; 
            border-left: 4px solid #ffffff; 
            padding-left: 21px; 
        }
        
        .menuItem i { 
            font-size: 18px; 
            width: 25px; 
            text-align: center; 
        }
        
        /* =========================================
           4. CONTENIDO PRINCIPAL Y PÁGINAS
        ========================================= */
        .main-content { 
            margin-left: 250px; 
            padding: 30px; 
            min-height: calc(100vh - 60px); 
            background: #0b0b0b; 
        }
        
        .page { 
            display: none; 
        }
        
        .page.active { 
            display: block; 
            animation: fadeIn 0.4s ease; 
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* =========================================
           5. CARRUSEL DINÁMICO (HERO SLIDER)
        ========================================= */
        .hero-container {
            width: 100%;
            height: 450px;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 40px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .hero-slide {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .hero-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 80px 40px 40px 40px;
            background: linear-gradient(to top, rgba(11,11,11,1) 0%, rgba(11,11,11,0.8) 40%, rgba(11,11,11,0) 100%);
            box-sizing: border-box;
        }

        .hero-overlay h2 {
            font-size: 38px;
            margin: 0 0 12px 0;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero-overlay p {
            font-size: 16px;
            margin: 0;
            color: #d1d1d1;
            max-width: 650px;
            line-height: 1.5;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .hero-indicators {
            position: absolute;
            bottom: 25px;
            right: 40px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator.active {
            background: #ffffff;
            transform: scale(1.2);
            width: 25px;
            border-radius: 5px;
        }
        
        /* =========================================
           6. SECCIONES DE PELÍCULAS / CONTENEDORES
        ========================================= */
        .section-title { 
            font-size: 22px; 
            font-weight: 600; 
            margin: 0 0 20px 0; 
            color: #ffffff; 
            letter-spacing: 0.5px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        
        .movie-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, min-max(160px, 1fr)); 
            gap: 22px; 
            margin-bottom: 45px; 
        }
        
        .movie-card { 
            background: #121212; 
            border-radius: 10px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            border: 1px solid #1a1a1a; 
            position: relative; 
        }
        
        .movie-card:hover { 
            transform: translateY(-8px); 
            border-color: #ffffff; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
        }
        
        .poster-container { 
            position: relative; 
            width: 100%; 
            padding-top: 145%; 
            background: #1a1a1a; 
        }
        
        .poster-container img { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .movie-info { 
            padding: 12px; 
        }
        
        .movie-title { 
            font-size: 14px; 
            font-weight: 600; 
            margin: 0 0 4px 0; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            color: #ffffff; 
        }
        
        .movie-meta { 
            font-size: 12px; 
            color: #8c8c8c; 
        }
        
        /* =========================================
           7. MODAL DETALLE (LIGHTBOX)
        ========================================= */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(5, 5, 5, 0.95); 
            z-index: 2000; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            box-sizing: border-box; 
            opacity: 0; 
            transition: opacity 0.3s ease; 
        }
        
        .modal.active { 
            display: flex; 
            opacity: 1; 
        }
        
        .modal-content { 
            background: #0b0b0b; 
            width: 100%; 
            max-width: 900px; 
            border-radius: 16px; 
            overflow: hidden; 
            position: relative; 
            border: 1px solid #222; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
            transform: scale(0.9); 
            transition: transform 0.3s ease; 
            display: flex; 
            flex-direction: column; 
            max-height: 90vh; 
        }
        
        .modal.active .modal-content { 
            transform: scale(1); 
        }
        
        .close-modal { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            font-size: 24px; 
            color: white; 
            background: rgba(0,0,0,0.5); 
            border: none; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 10; 
            transition: background 0.2s; 
        }
        
        .close-modal:hover { 
            background: #ffffff; 
            color: black; 
        }
        
        .modal-player-container { 
            position: relative; 
            width: 100%; 
            padding-top: 56.25%; 
            background: black; 
        }
        
        .modal-player-container iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        
        .modal-body { 
            padding: 30px; 
            overflow-y: auto; 
            display: flex; 
            gap: 25px; 
        }
        
        .modal-poster { 
            width: 180px; 
            flex-shrink: 0; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #222; 
            display: block; 
        }
        
        .modal-poster img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }
        
        .modal-info { 
            flex-grow: 1; 
        }
        
        .modal-title { 
            font-size: 28px; 
            font-weight: bold; 
            margin: 0 0 10px 0; 
        }
        
        .modal-metadata { 
            display: flex; 
            gap: 15px; 
            color: #8c8c8c; 
            font-size: 14px; 
            margin-bottom: 18px; 
        }
        
        .modal-synopsis { 
            font-size: 15px; 
            color: #d1d1d1; 
            line-height: 1.6; 
            margin: 0; 
        }
        
        /* =========================================
           8. RESPONSIVO (DISEÑO MÓVIL)
        ========================================= */
        @media (max-width: 992px) { 
            .menuBtn { display: flex; } 
            .menu { transform: translateX(-100%); } 
            .menu.open { transform: translateX(0); } 
            .main-content { margin-left: 0; padding: 20px; } 
            .hero-container { height: 320px; } 
            .hero-overlay h2 { font-size: 28px; } 
            .modal-body { flex-direction: column; padding: 20px; } 
            .modal-poster { display: none; } 
        }
        
        @media (max-width: 576px) { 
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; } 
            .hero-container { height: 220px; } 
            .hero-overlay { padding: 20px; } 
            .hero-overlay h2 { font-size: 20px; } 
            .hero-overlay p { font-size: 13px; } 
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="navbar">
        <div class="menuBtn" id="menuBtn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
        <div class="nav-logo">LUMERA</div>
    </div>

    <div id="menu" class="menu">
        <div class="menu-header">LUMERA</div>
        <div class="menuItem active" onclick="showPage('home')">
            <i class="fas fa-home"></i> Inicio
        </div>
        <div class="menuItem" onclick="showPage('movies')">
            <i class="fas fa-video"></i> Películas
        </div>
        <div class="menuItem" onclick="showPage('series')">
            <i class="fas fa-tv"></i> Series
        </div>
        <div class="menuItem" onclick="showPage('animes')">
            <i class="fas fa-child"></i> Animes
        </div>
    </div>

    <div class="main-content">
        
        <div id="home" class="page active">
            
            <div id="hero-slider-container" class="hero-container" onclick="onHeroClick()">
                <div class="hero-slide" id="hero-slide">
                    <img id="hero-img" src="" alt="Hero Banner">
                    <div class="hero-overlay">
                        <h2 id="hero-title">Cargando...</h2>
                        <p id="hero-desc"></p>
                    </div>
                </div>
                <div class="hero-indicators" id="hero-indicators"></div>
            </div>

            <h2 class="section-title"><i class="fas fa-star"></i> Destacados</h2>
            <div class="movie-grid" id="grid-destacados"></div>
            
            <h2 class="section-title"><i class="fas fa-clock"></i> Agregados Recientemente</h2>
            <div class="movie-grid" id="grid-recientes"></div>
        </div>
        
        <div id="movies" class="page">
            <h2 class="section-title"><i class="fas fa-video"></i> Todas las Películas</h2>
            <div class="movie-grid" id="grid-peliculas"></div>
        </div>
        
        <div id="series" class="page">
            <h2 class="section-title"><i class="fas fa-tv"></i> Todas las Series</h2>
            <div class="movie-grid" id="grid-series"></div>
        </div>
        
        <div id="animes" class="page">
            <h2 class="section-title"><i class="fas fa-child"></i> Todos los Animes</h2>
            <div class="movie-grid" id="grid-animes"></div>
        </div>
        
    </div>

    <div class="modal" id="movie-modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div class="modal-player-container">
                <iframe id="player-iframe" src="" allowfullscreen></iframe>
            </div>
            <div class="modal-body">
                <div class="modal-poster">
                    <img id="modal-poster-img" src="" alt="Poster">
                </div>
                <div class="modal-info">
                    <h2 class="modal-title" id="modal-title">Título</h2>
                    <div class="modal-metadata">
                        <span id="modal-year">Año</span>
                        <span id="modal-duration">Duración</span>
                    </div>
                    <p class="modal-synopsis" id="modal-synopsis">Sinopsis</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // VARIABLES GLOBALES DE DATOS
        let catalogData = [];
        let heroData = [];
        let currentHeroIndex = 0;
        let heroInterval = null;

        // CARGAR CATÁLOGO DESDE LA API (Google Sheets)
        async function fetchCatalog() {
            const url = "https://script.google.com/macros/s/AKfycbyd7f_M4WnBq-5-38bKqR6N4_7pU_Q-Cg13pB01Sg/exec";
            try {
                const response = await fetch(url);
                const data = await response.json();
                catalogData = data.catalog || [];
                heroData = data.hero || [];
                
                renderGrids();
                initHero();
            } catch (error) {
                console.error("Error al cargar el catálogo:", error);
            }
        }

        // RENDERIZAR LAS GRILLAS DE CADA SECCIÓN
        function renderGrids() {
            const gridDestacados = document.getElementById('grid-destacados');
            const gridRecientes = document.getElementById('grid-recientes');
            const gridPeliculas = document.getElementById('grid-peliculas');
            const gridSeries = document.getElementById('grid-series');
            const gridAnimes = document.getElementById('grid-animes');

            // Limpiar contenedores
            if(gridDestacados) gridDestacados.innerHTML = '';
            if(gridRecientes) gridRecientes.innerHTML = '';
            if(gridPeliculas) gridPeliculas.innerHTML = '';
            if(gridSeries) gridSeries.innerHTML = '';
            if(gridAnimes) gridAnimes.innerHTML = '';

            catalogData.forEach(item => {
                const card = createMovieCard(item);
                
                // Clasificar por tipo en sus respectivas pestañas
                if (item.type === 'movie' && gridPeliculas) gridPeliculas.appendChild(card.cloneNode(true));
                if (item.type === 'series' && gridSeries) gridSeries.appendChild(card.cloneNode(true));
                if (item.type === 'anime' && gridAnimes) gridAnimes.appendChild(card.cloneNode(true));

                // Clasificar para la página de Inicio (Destacados y Recientes)
                if (item.featured === true && gridDestacados) gridDestacados.appendChild(card.cloneNode(true));
                if (item.recent === true && gridRecientes) gridRecientes.appendChild(card.cloneNode(true));
            });

            // Re-vincular eventos click a las tarjetas clonadas
            document.querySelectorAll('.movie-card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = card.getAttribute('data-id');
                    const item = catalogData.find(m => m.id == id);
                    if (item) openModal(item);
                });
            });
        }

        // CREAR ESTRUCTURA DE TARJETA
        function createMovieCard(item) {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.setAttribute('data-id', item.id);

            card.innerHTML = `
                <div class="poster-container">
                    <img src="${item.poster || 'https://via.placeholder.com/300x450'}" alt="${item.title}">
                </div>
                <div class="movie-info">
                    <h3 class="movie-title">${item.title}</h3>
                    <div class="movie-meta">${item.year} • ${item.duration || ''}</div>
                </div>
            `;
            return card;
        }

        // SISTEMA DE NAVEGACIÓN ENTRE PÁGINAS
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.menuItem').forEach(item => item.classList.remove('active'));

            const targetPage = document.getElementById(pageId);
            if (targetPage) targetPage.classList.add('active');

            // Buscar cuál botón del menú activar basándonos en la función que llama
            const menuItems = document.querySelectorAll('.menuItem');
            menuItems.forEach(item => {
                if (item.getAttribute('onclick').includes(`'${pageId}'`)) {
                    item.classList.add('active');
                }
            });

            // En dispositivos móviles, cerrar el menú tras dar click
            if (window.innerWidth <= 992) {
                document.getElementById('menu').classList.remove('open');
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // MENÚ HAMBURGUESA (MÓVIL)
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('open');
        }

        // APERTURA Y CIERRE DEL MODAL REPRODUCTOR
        function openModal(item) {
            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-year').innerText = item.year;
            document.getElementById('modal-duration').innerText = item.duration || '';
            document.getElementById('modal-synopsis').innerText = item.synopsis || 'Sin sinopsis disponible.';
            document.getElementById('modal-poster-img').src = item.poster || '';
            
            const iframe = document.getElementById('player-iframe');
            iframe.src = item.player_url || '';

            document.getElementById('movie-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('movie-modal').classList.remove('active');
            document.getElementById('player-iframe').src = ''; // Detener video
        }

        function closeModalOnBackdrop(e) {
            if (e.target.id === 'movie-modal') closeModal();
        }

        // LOGICA COMPLETA DEL CARRUSEL DINÁMICO (HERO)
        function initHero() {
            if (!heroData || heroData.length === 0) return;
            renderHeroIndicators();
            showHeroSlide(0);
            startHeroTimer();
        }

        function renderHeroIndicators() {
            const container = document.getElementById('hero-indicators');
            if(!container) return;
            container.innerHTML = '';
            heroData.forEach((_, index) => {
                const indicator = document.createElement('div');
                indicator.className = `indicator ${index === 0 ? 'active' : ''}`;
                indicator.onclick = (e) => {
                    e.stopPropagation(); // Evita accionar el click del banner completo
                    showHeroSlide(index);
                    resetHeroTimer();
                };
                container.appendChild(indicator);
            });
        }

        function showHeroSlide(index) {
            if (!heroData || heroData.length === 0) return;
            currentHeroIndex = index;
            const hero = heroData[index];

            document.getElementById('hero-img').src = hero.banner_url || '';
            document.getElementById('hero-title').innerText = hero.title || '';
            document.getElementById('hero-desc').innerText = hero.synopsis || '';

            const indicators = document.querySelectorAll('.indicator');
            indicators.forEach((ind, idx) => {
                if (idx === index) ind.classList.add('active');
                else ind.classList.remove('active');
            });
        }

        function startHeroTimer() {
            heroInterval = setInterval(() => {
                let nextIndex = currentHeroIndex + 1;
                if (nextIndex >= heroData.length) nextIndex = 0;
                showHeroSlide(nextIndex);
            }, 7000); // Cambia cada 7 segundos
        }

        function resetHeroTimer() {
            clearInterval(heroInterval);
            startHeroTimer();
        }

        function onHeroClick() {
            if (!heroData || heroData.length === 0) return;
            const hero = heroData[currentHeroIndex];
            
            if (hero && hero.target_id) {
                const itemEncontrado = catalogData.find(p => p.id == hero.target_id);
                if (itemEncontrado) {
                    openModal(itemEncontrado);
                } else {
                    console.warn("No se encontró el item con ID correspondiente en el catálogo:", hero.target_id);
                }
            }
        }

        // EJECUCIÓN INICIAL AL CARGAR LA PÁGINA
        window.onload = () => {
            fetchCatalog();
        };
    </script>
</body>
</html>
